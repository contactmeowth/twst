name: Kokoro Background Voice
on: [workflow_dispatch] # Button dabao aur Chrome band kar do

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install System Dependencies
        run: sudo apt-get install espeak-ng -y # Kokoro ko espeak ki zaroorat hoti hai
        
      - name: Install Python Libraries
        run: pip install kokoro-onnx soundfile
        
      - name: Run Kokoro Script
        run: python kokoro_test.py
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-audio
          path: github_output.wav
          
