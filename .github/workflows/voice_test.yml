name: Voice Generation Test
on: [push, workflow_dispatch] # workflow_dispatch se tum manually bhi run kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5 for better caching
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install edge-tts
        
      - name: Run Voice Script
        run: python test_voice.py
        
      - name: Upload Audio
        uses: actions/upload-artifact@v4 # Fixed: version 4 is required in 2026
        with:
          name: voice-sample
          path: test_output.mp3
          
